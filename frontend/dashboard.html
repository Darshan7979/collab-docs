<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Collab Docs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="dashboard">
    <header class="navbar">
      <div class="brand-wrap">
        <img
          src="assets/syncdocs-logo.png"
          alt="SyncDocs logo"
          class="brand-logo"
          onerror="this.onerror=null;this.src='assets/syncdocs-logo.svg';"
        />
        <div>
          <h1 class="brand">SyncDocs</h1>
          <p class="subtitle">Write together in real-time</p>
        </div>
      </div>
      <div class="nav-actions">
        <span class="user-pill">Signed in as <strong class="js-user-email">...</strong></span>
        <button class="btn btn-ghost js-logout-btn">Logout</button>
      </div>
    </header>

    <main class="page-wrap">
      <section class="dashboard-actions">
        <h2>Your Documents</h2>
        <button id="new-doc-btn" class="btn btn-primary">+ New Document</button>
      </section>

      <section id="doc-list" class="doc-grid"></section>
      <p id="dashboard-message" class="message"></p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
  </body>
</html>
