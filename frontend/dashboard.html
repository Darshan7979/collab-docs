<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | SyncDocs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="dashboard-style.css" />
    <link rel="stylesheet" href="animation.css" />
  </head>
  <body data-page="dashboard">
    <!-- Premium Animated Background -->
    <div class="premium-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb orb-4"></div>
      <div class="premium-grid"></div>
    </div>

    <header class="navbar-dashboard">
      <div class="navbar-inner">
        <div class="navbar-left">
          <button id="dashboard-back-btn" class="navbar-back-btn" type="button">
            <span class="back-icon" aria-hidden="true">&#8592;</span>
            <span>Back</span>
          </button>
          <div class="nav-divider"></div>
          <div class="brand-wrap">
            <h1 class="brand">SyncDocs</h1>
          </div>
        </div>

        <div class="nav-actions navbar-right">
          <div class="user-pill">
            <div class="user-avatar js-user-initials">?</div>
            <span class="js-user-email">...</span>
          </div>
          <button class="btn btn-ghost js-logout-btn">Logout</button>
        </div>
      </div>
    </header>

    <main class="page-wrap">
      <section class="welcome-hero">
        <p class="welcome-greeting">Dashboard</p>
        <h2 class="welcome-title">Your Documents</h2>
        <p class="welcome-sub js-doc-count"></p>
      </section>

      <section class="toolbar-row">
        <div class="toolbar-left">
          <button class="toolbar-tab active">All</button>
          <button class="toolbar-tab">Recent</button>
          <button class="toolbar-tab">Shared</button>
        </div>
        <div class="toolbar-right">
          <button id="refresh-docs-btn" class="btn-icon-only" title="Refresh" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button id="new-doc-btn" class="btn-new" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New document
          </button>
        </div>
      </section>

      <section id="doc-list" class="doc-list"></section>
      <p id="dashboard-message" class="message"></p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
  </body>
</html>
