<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor | Collab Docs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="editor">
    <header class="navbar">
      <div class="brand-wrap editor-head-wrap">
        <img
          src="assets/syncdocs-logo.png"
          alt="SyncDocs logo"
          class="brand-logo"
          onerror="this.onerror=null;this.src='assets/syncdocs-logo.svg';"
        />
        <div class="editor-title-group">
          <input id="doc-title" class="title-input" value="Untitled Document" />
          <p class="subtitle">Collaborative editor</p>
        </div>
      </div>
      <div class="nav-actions">
        <span class="user-pill">Signed in as <strong class="js-user-email">...</strong></span>
        <button id="share-link-btn" class="btn btn-secondary">Share</button>
        <button id="save-now-btn" class="btn btn-secondary">Save Now</button>
        <a href="dashboard.html" class="btn btn-ghost">Dashboard</a>
        <button class="btn btn-ghost js-logout-btn">Logout</button>
      </div>
    </header>

    <main class="editor-shell">
      <section class="collab-bar">
        <p class="doc-id-text">Document ID: <strong id="doc-id-display">...</strong></p>
        <div class="add-people-wrap">
          <input id="add-user-email" type="email" placeholder="Enter user email" />
          <button id="add-user-btn" class="btn btn-primary">Add User</button>
        </div>
      </section>

      <div id="toolbar-container">
        <span class="ql-formats">
          <select class="ql-header">
            <option selected></option>
            <option value="1"></option>
            <option value="2"></option>
          </select>
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
        </span>
      </div>
      <div id="editor"></div>
      <p id="editor-status" class="message">Waiting for document...</p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
  </body>
</html>
